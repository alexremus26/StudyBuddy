services:
  db:
    image: postgis/postgis:17-3.4
    platform: linux/amd64
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    container_name: django-app
    user: "${UID:-1000}:${GID:-1000}" # match local host's user ID and group ID
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_ENGINE=django.contrib.gis.db.backends.postgis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: ./backend
    container_name: celery-worker
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_ENGINE=django.contrib.gis.db.backends.postgis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: sh -c "celery -A core worker --loglevel=info -Q coffeeshops"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  gemini-worker:
    build: ./backend
    container_name: celery-gemini-worker
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_ENGINE=django.contrib.gis.db.backends.postgis
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: sh -c "celery -A core worker --loglevel=info -Q gemini --concurrency=1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  vite:
    build:
      context: ./frontend
      target: vite-dev
    container_name: vite-app
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./backend:/backend
    env_file:
      - .env
    environment:
      - NPM_CONFIG_INCLUDE=dev
    command: sh -c "npm install --include=dev && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - web

volumes:
  postgres_data:
  media_data: