services:
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    container_name: django-app
    user: "${UID:-1000}:${GID:-1000}" # match local host's user ID and group ID
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-bootstrap:
        condition: service_completed_successfully

  ollama:
    image: ollama/ollama:latest
    container_name: studybuddy-ollama
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  ollama-bootstrap:
    image: ollama/ollama:latest
    container_name: studybuddy-ollama-bootstrap
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/bootstrap-models.sh:/bootstrap-models.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap-models.sh"]
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy

  vite:
    build:
      context: ./frontend
      target: vite-dev
    container_name: vite-app
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./backend:/backend
    environment:
      - NPM_CONFIG_INCLUDE=dev
    command: sh -c "npm install --include=dev && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - web

volumes:
  postgres_data:
  media_data:
  ollama_data: