name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.4
        env:
          POSTGRES_DB: studybuddy
          POSTGRES_USER: studybuddy
          POSTGRES_PASSWORD: studybuddy
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U studybuddy -d studybuddy"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SECRET_KEY: github-actions-secret-key
      DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_ENGINE: django.contrib.gis.db.backends.postgis
      DATABASE_NAME: studybuddy
      DATABASE_USERNAME: studybuddy
      DATABASE_PASSWORD: studybuddy
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: "5432"
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/0

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev proj-bin

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_MAPBOX_ACCESS_TOKEN: ""
        run: npm run build